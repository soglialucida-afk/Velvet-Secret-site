<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1600" role="img" aria-label="Minimal cosmic blue card back">
  <defs>
    <radialGradient id="space" cx="50%" cy="50%" r="76%">
      <stop offset="0%" stop-color="#123f92"/>
      <stop offset="28%" stop-color="#071f58"/>
      <stop offset="68%" stop-color="#030a24"/>
      <stop offset="100%" stop-color="#01030d"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="34%">
      <stop offset="0%" stop-color="#e9fbff" stop-opacity="0.95"/>
      <stop offset="9%" stop-color="#7de5ff" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#2578ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#020713" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula" cx="46%" cy="46%" r="72%">
      <stop offset="0%" stop-color="#1a6dff" stop-opacity="0.22"/>
      <stop offset="44%" stop-color="#154aa4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020713" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="stars" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="27" cy="41" r="0.9" fill="#dff8ff" opacity="0.5"/>
      <circle cx="113" cy="32" r="0.7" fill="#6ccfff" opacity="0.45"/>
      <circle cx="72" cy="119" r="0.8" fill="#eefcff" opacity="0.36"/>
      <circle cx="144" cy="132" r="0.55" fill="#7c8cff" opacity="0.46"/>
    </pattern>
    <linearGradient id="axis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8eeaff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#8eeaff" stop-opacity="0.38"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="55%" stop-color="#8eeaff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#8eeaff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="1600" rx="46" fill="#01030d"/>
  <rect x="18" y="18" width="964" height="1564" rx="38" fill="url(#space)"/>
  <rect x="18" y="18" width="964" height="1564" rx="38" fill="url(#stars)" opacity="0.72"/>
  <ellipse cx="500" cy="800" rx="380" ry="560" fill="url(#nebula)" opacity="0.85" filter="url(#blur)"/>
  <rect x="495" y="300" width="10" height="1000" fill="url(#axis)" opacity="0.46"/>
  <circle cx="500" cy="800" r="250" fill="url(#centerGlow)"/>

  <g transform="translate(500 800)" fill="none" stroke="#8eeaff" stroke-linecap="round" opacity="0.54">
    <circle r="58" stroke-width="1.2"/>
    <circle r="132" stroke-width="0.85" opacity="0.5"/>
    <ellipse rx="226" ry="68" stroke-width="0.85" opacity="0.36" transform="rotate(-10)"/>
    <ellipse rx="226" ry="68" stroke-width="0.85" opacity="0.26" transform="rotate(10)"/>
  </g>

  <g transform="translate(500 800)" fill="#eafbff">
    <circle r="5" opacity="0.96"/>
    <path d="M0 -52 L8 -8 L52 0 L8 8 L0 52 L-8 8 L-52 0 L-8 -8Z" opacity="0.84"/>
  </g>

  <g fill="#9eeaff" opacity="0.58">
    <circle cx="500" cy="468" r="1.6"/>
    <circle cx="500" cy="1132" r="1.6"/>
    <circle cx="354" cy="697" r="1.1"/>
    <circle cx="646" cy="903" r="1.1"/>
    <circle cx="612" cy="642" r="1"/>
    <circle cx="388" cy="958" r="1"/>
  </g>
</svg>
